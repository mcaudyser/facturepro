<title>MMS &mdash; Devis &amp; Factures</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--green:#1B4D3E;--green-light:#2D6A55;--green-pale:#EBF2EF;--gold:#C9A84C;--dark:#1A1A1A;--gray:#6B7280;--light:#F8F9F8;--border:#D1D9D6;--red:#E53E3E;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{-webkit-text-size-adjust:100%;}
body{font-family:"DM Sans",sans-serif;background:var(--light);color:var(--dark);min-height:100vh;min-height:100dvh;-webkit-font-smoothing:antialiased;}

/* ── HEADER ── */
.app-header{background:var(--green);padding:14px 24px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:100;box-shadow:0 2px 20px rgba(27,77,62,.3);}
.app-header img{height:32px;filter:brightness(0) invert(1);}
.app-header h1{font-family:"Cormorant Garamond",serif;color:#fff;font-size:20px;font-weight:600;flex:1;}
.app-header .reset-btn{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;padding:8px 14px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;font-family:"DM Sans",sans-serif;transition:all .2s;display:flex;align-items:center;gap:6px;}
.app-header .reset-btn:hover{background:rgba(255,255,255,.2);}

/* ── MODE TOGGLE ── */
.mode-toggle{padding:20px 24px 0;background:#fff;border-bottom:1px solid var(--border);}
.toggle-wrap{display:flex;background:var(--green-pale);border-radius:12px;padding:4px;gap:4px;max-width:400px;margin:0 auto;}
.toggle-btn{flex:1;padding:12px 16px;border:none;background:transparent;border-radius:8px;font-family:"Cormorant Garamond",serif;font-size:16px;font-weight:600;color:var(--gray);cursor:pointer;transition:all .25s;letter-spacing:.5px;}
.toggle-btn.active{background:var(--green);color:#fff;box-shadow:0 2px 8px rgba(27,77,62,.2);}

/* ── WORKSPACE ── */
.workspace{display:grid;grid-template-columns:1fr 1fr;}
.form-panel{padding:28px 32px;overflow-y:auto;border-right:1px solid var(--border);background:#fff;}
.section-title{font-family:"Cormorant Garamond",serif;font-size:18px;font-weight:700;color:var(--green);margin-bottom:14px;padding-bottom:8px;border-bottom:2px solid var(--green-pale);display:flex;align-items:center;gap:8px;}
.dot{width:8px;height:8px;background:var(--gold);border-radius:50%;display:inline-block;}
.form-section{margin-bottom:28px;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.form-grid.full{grid-template-columns:1fr;}
.field{display:flex;flex-direction:column;gap:5px;}
label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--gray);}
input,textarea,select{border:1.5px solid var(--border);border-radius:8px;padding:11px 14px;font-family:"DM Sans",sans-serif;font-size:14px;color:var(--dark);background:var(--light);outline:none;width:100%;transition:all .2s;}
input:focus,textarea:focus,select:focus{border-color:var(--green);background:#fff;box-shadow:0 0 0 3px rgba(27,77,62,.08);}
textarea{resize:vertical;min-height:60px;font-family:"DM Sans",sans-serif;}

/* ── AUTOCOMPLETE ── */
.ac-wrap{position:relative;}
.ac-list{position:absolute;top:100%;left:0;right:0;background:#fff;border:1.5px solid var(--green);border-top:none;border-radius:0 0 8px 8px;z-index:9999;max-height:180px;overflow-y:auto;box-shadow:0 8px 20px rgba(0,0,0,.12);display:none;}
.ac-item{padding:10px 14px;font-size:13px;cursor:pointer;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;transition:background .15s;}
.ac-item:last-child{border-bottom:none;}
.ac-item:hover,.ac-item:active{background:var(--green-pale);color:var(--green);font-weight:500;}
.badge{font-size:10px;background:var(--green-pale);color:var(--green);padding:1px 6px;border-radius:20px;font-weight:600;flex-shrink:0;}

/* ── PRESTATIONS ── */
.prest-item{background:var(--light);border:1.5px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px;position:relative;}
.prest-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;margin-top:10px;}
.prest-line-total{margin-top:10px;padding-top:8px;border-top:1px dashed var(--border);text-align:right;font-size:12px;color:var(--gray);}
.prest-line-total strong{color:var(--green);font-weight:600;}
.remove-btn{position:absolute;top:10px;right:10px;background:none;border:none;cursor:pointer;color:var(--red);font-size:18px;line-height:1;padding:4px 8px;border-radius:4px;transition:background .2s;}
.remove-btn:hover,.remove-btn:active{background:#FEE2E2;}
.add-prest-btn{width:100%;padding:12px;border:2px dashed var(--green-light);background:none;border-radius:8px;color:var(--green);font-family:"DM Sans",sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:all .2s;margin-top:4px;}
.add-prest-btn:hover,.add-prest-btn:active{background:var(--green-pale);border-style:solid;}

/* ── BUTTONS ── */
.gen-btn{width:100%;padding:16px;background:var(--green);color:#fff;border:none;border-radius:10px;font-family:"Cormorant Garamond",serif;font-size:18px;font-weight:700;cursor:pointer;letter-spacing:.5px;transition:all .25s;display:flex;align-items:center;justify-content:center;gap:10px;margin-top:8px;}
.gen-btn:hover{background:var(--green-light);transform:translateY(-1px);box-shadow:0 6px 20px rgba(27,77,62,.3);}
.gen-btn:disabled{opacity:.6;cursor:not-allowed;transform:none;}

/* ── PREVIEW ── */
.preview-panel{padding:28px 32px;background:#E8EDE9;overflow-y:auto;}
.preview-label{font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--gray);margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.preview-label::after{content:"";flex:1;height:1px;background:var(--border);}

#invoice-preview{background:#fff;width:100%;max-width:700px;margin:0 auto;padding:48px 52px;box-shadow:0 8px 40px rgba(0,0,0,.12);border-radius:4px;font-family:"DM Sans",sans-serif;font-size:13px;color:#1A1A1A;}
.inv-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:36px;padding-bottom:24px;border-bottom:2px solid var(--green);}
.inv-logo{height:130px;object-fit:contain;}
.inv-title-block{text-align:right;}
.inv-title{font-family:"Cormorant Garamond",serif;font-size:28px;font-weight:700;color:var(--green);letter-spacing:1px;}
.inv-number{font-size:15px;font-weight:600;color:#1A1A1A;margin-top:2px;}
.inv-date{font-size:12px;color:var(--gray);margin-top:4px;}
.inv-parties{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:32px;}
.inv-party-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--green);margin-bottom:8px;}
.inv-party p{font-size:12.5px;line-height:1.7;}
.inv-table{width:100%;border-collapse:collapse;margin-bottom:20px;}
.inv-table thead tr{background:var(--green);color:#fff;}
.inv-table thead th{padding:10px 12px;text-align:left;font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;}
.inv-table thead th.right{text-align:right;}
.inv-table thead th.center{text-align:center;}
.inv-table tbody tr{border-bottom:1px solid var(--border);}
.inv-table tbody tr:nth-child(even){background:var(--green-pale);}
.inv-table tbody td{padding:10px 12px;font-size:12px;line-height:1.5;}
.inv-table tbody td.right{text-align:right;font-weight:500;}
.inv-table tbody td.center{text-align:center;}
.inv-totals{display:flex;flex-direction:column;align-items:flex-end;margin-bottom:12px;}
.inv-total-row{display:flex;justify-content:space-between;width:240px;padding:5px 0;font-size:13px;border-bottom:1px solid var(--border);color:var(--gray);}
.inv-total-final{background:var(--green);color:#fff;font-weight:700;font-size:15px;padding:10px 14px;border-radius:4px;margin-top:6px;width:260px;display:flex;justify-content:space-between;}
.inv-tva-note{font-size:11px;color:var(--gray);font-style:italic;margin-bottom:24px;}
.inv-footer-block{background:var(--green-pale);border-left:3px solid var(--green);padding:14px 16px;border-radius:0 6px 6px 0;margin-bottom:12px;}
.inv-footer-block h4{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--green);margin-bottom:8px;}
.inv-footer-block p{font-size:11.5px;line-height:1.7;}
.signature-zone{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:8px;}
.sig-box{border:1.5px dashed var(--green);border-radius:6px;padding:14px;min-height:90px;}
.sig-box .sig-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--green);margin-bottom:8px;}
.sig-box .sig-line{border-bottom:1px solid var(--gray);margin-top:30px;font-size:10.5px;color:var(--gray);padding-bottom:2px;}
.sig-box .sig-mention{font-size:11px;color:var(--dark);font-style:italic;}
.inv-legal{margin-top:16px;padding-top:12px;border-top:1px solid var(--border);font-size:10.5px;color:var(--gray);line-height:1.6;}

/* ── MOBILE OPTIMIZATIONS ── */
@media(max-width:900px){
  .app-header{padding:12px 16px;}
  .app-header h1{font-size:17px;}
  .app-header .reset-btn span{display:none;}
  .mode-toggle{padding:16px 16px 0;}
  .workspace{grid-template-columns:1fr;}
  .form-panel{padding:20px 16px;border-right:none;}
  .preview-panel{padding:16px;}
  #invoice-preview{padding:24px 20px;font-size:12px;}
  .inv-header{flex-direction:column;gap:16px;align-items:center;text-align:center;}
  .inv-title-block{text-align:center;}
  .inv-logo{height:90px;}
  .inv-parties{grid-template-columns:1fr;}
  .signature-zone{grid-template-columns:1fr;}
  .inv-table thead th,.inv-table tbody td{padding:8px 6px;font-size:11px;}
  .inv-total-row,.inv-total-final{width:100%;}
  .form-grid{grid-template-columns:1fr;}
  .prest-grid{grid-template-columns:1fr 1fr;}
  input,textarea,select{padding:13px 14px;font-size:16px;}
  .gen-btn{padding:18px;font-size:17px;}
  .ac-list{max-height:160px;}
  .ac-item{padding:12px 14px;font-size:14px;}
  .toggle-btn{padding:14px 12px;font-size:15px;}
}

/* ── FAB FOR MOBILE PREVIEW ── */
.preview-toggle-fab{display:none;position:fixed;bottom:20px;right:20px;width:56px;height:56px;border-radius:50%;background:var(--green);color:#fff;border:none;box-shadow:0 6px 20px rgba(27,77,62,.4);z-index:99;cursor:pointer;align-items:center;justify-content:center;}
.preview-toggle-fab svg{width:24px;height:24px;}
@media(max-width:900px){
  .preview-toggle-fab{display:flex;}
  .preview-panel{display:none;}
  .preview-panel.show-mobile{display:block;position:fixed;top:0;left:0;right:0;bottom:0;z-index:200;overflow-y:auto;background:#E8EDE9;padding-top:60px;}
  .preview-panel.show-mobile .close-preview{display:flex;position:fixed;top:12px;right:12px;width:44px;height:44px;border-radius:50%;background:var(--green);color:#fff;border:none;align-items:center;justify-content:center;cursor:pointer;font-size:24px;z-index:300;box-shadow:0 4px 12px rgba(0,0,0,.2);}
}
.close-preview{display:none;}

/* ── INSTALL PROMPT ── */
.install-banner{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--green);color:#fff;padding:14px 16px;z-index:1000;align-items:center;gap:12px;box-shadow:0 -4px 20px rgba(0,0,0,.2);}
.install-banner.show{display:flex;}
.install-banner span{flex:1;font-size:13px;}
.install-banner button{background:#fff;color:var(--green);border:none;padding:8px 14px;border-radius:6px;font-weight:600;font-size:13px;cursor:pointer;}
.install-banner .close{background:transparent;color:#fff;font-size:20px;padding:0 8px;}
</style>

  "Prestation de services administratifs",
  "Assistance administrative",

  echeance: "inv-echeance",
  validite: "inv-echeance",
  clientName: "client-name",
  clientAddress: "client-address",
  clientPhone: "client-phone"
};

// State
var currentMode = "facture";
var MEMORY = JSON.parse(JSON.stringify(DEFAULT_MEMORY));
var PREST_DESC = DEFAULT_PREST_DESC.slice();
var CLIENT_DB = JSON.parse(JSON.stringify(DEFAULT_CLIENT_DB));
var EMITTER = JSON.parse(JSON.stringify(DEFAULT_EMITTER));
var deferredInstallPrompt = null;

// ============================================================
// PERSISTENCE
// ============================================================
function loadData() {
  try {
    var raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    var data = JSON.parse(raw);

    if (data.emitter) EMITTER = Object.assign({}, DEFAULT_EMITTER, data.emitter);
    if (data.memory) MEMORY = Object.assign({}, DEFAULT_MEMORY, data.memory);
    if (data.prestDesc) PREST_DESC = data.prestDesc;
    if (data.clientDB) CLIENT_DB = Object.assign({}, DEFAULT_CLIENT_DB, data.clientDB);

    // Restore form fields
    if (data.form) {
      Object.keys(data.form).forEach(function(id) {
        var el = document.getElementById(id);
        if (el && el.value !== undefined) el.value = data.form[id];
      });
    }

    // Restore mode
    if (data.mode) setMode(data.mode, true);
  } catch(e) {
    console.warn("Could not load saved data:", e);
  }
}

function saveData() {
  try {
    var formIds = ["inv-number","inv-date","inv-echeance","inv-object",
                   "client-name","client-contact","client-address","client-phone","client-email"];
    var form = {};
    formIds.forEach(function(id){
      var el = document.getElementById(id);
      if (el) form[id] = el.value;
    });

    // Save prestations
    form._prestations = getPrestations();

    var data = {
      emitter: EMITTER,
      memory: MEMORY,
      prestDesc: PREST_DESC,
      clientDB: CLIENT_DB,
      form: form,
      mode: currentMode
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  } catch(e) {
    console.warn("Could not save data:", e);
  }
}

function loadCounters() {
  try {
    var raw = localStorage.getItem(COUNTERS_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return { facture: 2025010, devis: 2026001 };
}

function saveCounters(c) {
  localStorage.setItem(COUNTERS_KEY, JSON.stringify(c));
}

function incrementCounter() {
  var c = loadCounters();
  c[currentMode]++;
  saveCounters(c);
  document.getElementById("inv-number").value = c[currentMode];
  saveData();
  updatePreview();
}

function resetForm() {
  if (!confirm("Effacer tous les champs et recommencer ?\n(Vos suggestions et infos émetteur sont conservées)")) return;

  var formIds = ["inv-object","client-name","client-contact","client-address","client-phone","client-email"];
  formIds.forEach(function(id){
    var el = document.getElementById(id);
    if (el) el.value = "";
  });

  // Reset date to today
  document.getElementById("inv-date").value = new Date().toISOString().split("T")[0];

  // Set next number from counter
  var c = loadCounters();
  document.getElementById("inv-number").value = c[currentMode];

  // Clear prestations and add one fresh
  document.getElementById("prest-container").innerHTML = "";
  prestCount = 0;
  addPrest();

  saveData();
  updatePreview();
}

// ============================================================
// MODE TOGGLE
// ============================================================
function setMode(mode, silent) {
  currentMode = mode;
  document.getElementById("btn-mode-facture").classList.toggle("active", mode === "facture");
  document.getElementById("btn-mode-devis").classList.toggle("active", mode === "devis");

  if (mode === "devis") {
    document.getElementById("info-section-title").textContent = "Informations du devis";
    document.getElementById("lbl-num").textContent = "Num\u00e9ro de devis";
    document.getElementById("lbl-echeance").textContent = "Validit\u00e9 du devis";
    document.getElementById("inv-echeance").placeholder = "ex : 3 mois";
    document.getElementById("gen-btn-text").textContent = "G\u00e9n\u00e9rer le Devis PDF";
  } else {
    document.getElementById("info-section-title").textContent = "Informations de la facture";
    document.getElementById("lbl-num").textContent = "Num\u00e9ro de facture";
    document.getElementById("lbl-echeance").textContent = "\u00c9ch\u00e9ance de paiement";
    document.getElementById("inv-echeance").placeholder = "ex : Sous 30 jours";
    document.getElementById("gen-btn-text").textContent = "G\u00e9n\u00e9rer la Facture PDF";
  }

  // Update number from counter
  if (!silent) {
    var c = loadCounters();
    document.getElementById("inv-number").value = c[mode];
    saveData();
  }

  updatePreview();
}

// ============================================================
// AUTOCOMPLETE
// ============================================================
function esc(s) {
  return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function showAC(field, val) {
  var listEl = document.getElementById("ac-" + field);
  if (!listEl) return;

  // Special: in devis mode, "echeance" field uses validite suggestions
  var actualField = field;
  if (field === "echeance" && currentMode === "devis") actualField = "validite";

  var suggestions = MEMORY[actualField] || [];
  var q = (val||"").toLowerCase();
  var filtered = q === "" ? suggestions : suggestions.filter(function(s){ return s.toLowerCase().indexOf(q) !== -1; });
  if (!filtered.length) { listEl.style.display = "none"; return; }

  var html = "";
  for (var i = 0; i < filtered.length; i++) {
    html += "<div class=\"ac-item\" data-val=\"" + esc(filtered[i]) + "\" data-field=\"" + field + "\" onmousedown=\"pickAC(event)\" ontouchstart=\"pickAC(event)\"><span class=\"badge\">Suggestion</span> " + esc(filtered[i]) + "</div>";
  }
  listEl.innerHTML = html;
  listEl.style.display = "block";
}

function pickAC(e) {
  e.preventDefault();
  var el = e.currentTarget;
  var val = el.dataset.val;
  var field = el.dataset.field;
  var inputId = AC_MAP[field];
  if (inputId) document.getElementById(inputId).value = val;
  document.getElementById("ac-" + field).style.display = "none";
  if (field === "clientName") autoFillClient(val);
  saveData();
  updatePreview();
}

function hideAC(field) {
  setTimeout(function() {
    var el = document.getElementById("ac-" + field);
    if (el) el.style.display = "none";
  }, 250);
}

function autoFillClient(name) {
  var data = CLIENT_DB[name];
  if (!data) return;
  if (data.address) document.getElementById("client-address").value = data.address;
  if (data.phone) document.getElementById("client-phone").value = data.phone;
  if (data.email) document.getElementById("client-email").value = data.email;
}

// Learn new clients on the fly
function learnClient() {
  var name = document.getElementById("client-name").value.trim();
  if (!name) return;
  var address = document.getElementById("client-address").value.trim();
  var phone = document.getElementById("client-phone").value.trim();
  var email = document.getElementById("client-email").value.trim();

  CLIENT_DB[name] = { address: address, phone: phone, email: email };

  if (MEMORY.clientName.indexOf(name) === -1) MEMORY.clientName.unshift(name);
  if (address && MEMORY.clientAddress.indexOf(address) === -1) MEMORY.clientAddress.unshift(address);
  if (phone && MEMORY.clientPhone.indexOf(phone) === -1) MEMORY.clientPhone.unshift(phone);
  saveData();
}

// ============================================================
// PRESTATIONS
// ============================================================
var prestCount = 0;

function addPrest(prefill) {
  prestCount++;
  var id = prestCount;
  var container = document.getElementById("prest-container");
  var div = document.createElement("div");
  div.className = "prest-item";
  div.id = "prest-" + id;

  var sugHtml = "";
  for (var i = 0; i < PREST_DESC.length; i++) {
    sugHtml += "<div class=\"ac-item\" data-val=\"" + esc(PREST_DESC[i]) + "\" data-id=\"" + id + "\" onmousedown=\"pickDesc(event)\" ontouchstart=\"pickDesc(event)\"><span class=\"badge\">Suggestion</span> " + esc(PREST_DESC[i]) + "</div>";
  }

  div.innerHTML =
    "<button class=\"remove-btn\" onclick=\"removePrest(" + id + ")\" title=\"Supprimer\">&#x2715;</button>" +
    "<div class=\"field\" style=\"margin-bottom:6px\">" +
    "<label>Description de la prestation</label>" +
    "<div class=\"ac-wrap\">" +
    "<textarea data-field=\"desc\" rows=\"2\" placeholder=\"Cliquez pour voir les suggestions...\"" +
    " onfocus=\"showDescAC(" + id + ", this.value)\"" +
    " oninput=\"showDescAC(" + id + ", this.value); updatePreview(); saveData()\"" +
    " onblur=\"hideDescAC(" + id + ")\"></textarea>" +
    "<div class=\"ac-list\" id=\"ac-desc-" + id + "\">" + sugHtml + "</div>" +
    "</div></div>" +
    "<div class=\"prest-grid\">" +
    "<div class=\"field\"><label>Quantit\u00e9 / Unit\u00e9</label><input type=\"text\" data-field=\"qty\" placeholder=\"ex : 9 jours\" oninput=\"updatePreview();saveData()\"></div>" +
    "<div class=\"field\"><label>Prix unit. (\u20ac)</label><input type=\"number\" data-field=\"price\" placeholder=\"200\" min=\"0\" step=\"0.01\" oninput=\"updateLineTotal(" + id + ");updatePreview();saveData()\"></div>" +
    "<div class=\"field\"><label>Nb unit\u00e9s</label><input type=\"number\" data-field=\"units\" placeholder=\"9\" min=\"0\" step=\"0.01\" oninput=\"updateLineTotal(" + id + ");updatePreview();saveData()\"></div>" +
    "<div class=\"field\"><label>TVA (%)</label><select data-field=\"tva\" onchange=\"updateLineTotal(" + id + ");updatePreview();saveData()\">" +
    "<option value=\"0\" selected>0% (Art. 293B)</option>" +
    "<option value=\"5.5\">5,5%</option>" +
    "<option value=\"10\">10%</option>" +
    "<option value=\"20\">20%</option>" +
    "</select></div>" +
    "</div>" +
    "<div class=\"prest-line-total\" id=\"line-total-" + id + "\">Total ligne : <strong>0,00 \u20ac</strong></div>";

  container.appendChild(div);

  if (prefill) {
    div.querySelector("[data-field=desc]").value = prefill.desc || "";
    div.querySelector("[data-field=qty]").value = prefill.qty || "";
    div.querySelector("[data-field=price]").value = prefill.price || "";
    div.querySelector("[data-field=units]").value = prefill.units || "";
    div.querySelector("[data-field=tva]").value = prefill.tva || "0";
    updateLineTotal(id);
  }

  updatePreview();
}

function showDescAC(id, val) {
  var listEl = document.getElementById("ac-desc-" + id);
  if (!listEl) return;
  var q = (val||"").toLowerCase();
  var filtered = q === "" ? PREST_DESC : PREST_DESC.filter(function(s){ return s.toLowerCase().indexOf(q) !== -1; });
  if (!filtered.length) { listEl.style.display = "none"; return; }
  var html = "";
  for (var i = 0; i < filtered.length; i++) {
    html += "<div class=\"ac-item\" data-val=\"" + esc(filtered[i]) + "\" data-id=\"" + id + "\" onmousedown=\"pickDesc(event)\" ontouchstart=\"pickDesc(event)\"><span class=\"badge\">Suggestion</span> " + esc(filtered[i]) + "</div>";
  }
  listEl.innerHTML = html;
  listEl.style.display = "block";
}

function pickDesc(e) {
  e.preventDefault();
  var el = e.currentTarget;
  var val = el.dataset.val;
  var id = el.dataset.id;
  var prest = document.getElementById("prest-" + id);
  if (prest) prest.querySelector("[data-field=desc]").value = val;
  document.getElementById("ac-desc-" + id).style.display = "none";
  saveData();
  updatePreview();
}

function hideDescAC(id) {
  setTimeout(function() {
    var el = document.getElementById("ac-desc-" + id);
    if (el) el.style.display = "none";
  }, 250);
}

function removePrest(id) {
  var el = document.getElementById("prest-" + id);
  if (el) el.remove();
  saveData();
  updatePreview();
}

function updateLineTotal(id) {
  var item = document.getElementById("prest-" + id);
  if (!item) return;
  var price = parseFloat(item.querySelector("[data-field=price]").value) || 0;
  var units = parseFloat(item.querySelector("[data-field=units]").value) || 0;
  var tva = parseFloat(item.querySelector("[data-field=tva]").value) || 0;
  var ht = price * units;
  var ttc = ht * (1 + tva/100);
  document.getElementById("line-total-" + id).innerHTML = "Total ligne : <strong>" + fmt(ttc) + "</strong>" + (tva > 0 ? " <span style='color:var(--gray)'>(HT : " + fmt(ht) + ")</span>" : "");
}

function getPrestations() {
  var items = document.querySelectorAll(".prest-item");
  var result = [];
  for (var i = 0; i < items.length; i++) {
    var item = items[i];
    result.push({
      desc: item.querySelector("[data-field=desc]").value,
      qty: item.querySelector("[data-field=qty]").value,
      price: parseFloat(item.querySelector("[data-field=price]").value) || 0,
      units: parseFloat(item.querySelector("[data-field=units]").value) || 0,
      tva: parseFloat(item.querySelector("[data-field=tva]").value) || 0
    });
  }
  return result;
}

// ============================================================
// PREVIEW
// ============================================================
function updatePreview() {
  var num = document.getElementById("inv-number").value || "-";
  var dateVal = document.getElementById("inv-date").value;
  var echeance = document.getElementById("inv-echeance").value;
  var obj = document.getElementById("inv-object").value;

  // Title & number
  document.getElementById("prev-title").textContent = currentMode === "devis" ? "DEVIS" : "FACTURE";
  document.getElementById("prev-number").textContent = "N\u00b0 " + num;

  // Date
  if (dateVal) {
    var p = dateVal.split("-");
    document.getElementById("prev-date").textContent = "Date d'\u00e9mission : " + p[2] + "/" + p[1] + "/" + p[0];
  } else {
    document.getElementById("prev-date").textContent = "";
  }

  // Echeance / Validite
  var echTop = document.getElementById("prev-echeance-top");
  if (echeance) {
    echTop.textContent = (currentMode === "devis" ? "Validit\u00e9 : " : "\u00c9ch\u00e9ance : ") + echeance;
  } else {
    echTop.textContent = "";
  }

  // Emitter
  var em = EMITTER;
  document.getElementById("prev-emitter").innerHTML =
    "<strong>" + esc(em.name) + "</strong><br>" +
    esc(em.address) + "<br>" +
    esc(em.email) + "<br>" +
    esc(em.phone) + "<br>" +
    "SIRET : " + esc(em.siret) + "<br>" +
    "APE : " + esc(em.ape);

  // Object line
  var objLine = document.getElementById("prev-obj-line");
  document.getElementById("prev-obj").textContent = obj;
  objLine.style.display = obj ? "block" : "none";

  // Client
  var name = document.getElementById("client-name").value;
  var contact = document.getElementById("client-contact").value;
  var address = document.getElementById("client-address").value;
  var phone = document.getElementById("client-phone").value;
  var email = document.getElementById("client-email").value;
  var cHtml = "";
  if (name) cHtml += "<strong>" + esc(name) + "</strong><br>";
  if (contact) cHtml += esc(contact) + "<br>";
  if (address) cHtml += esc(address) + "<br>";
  if (phone) cHtml += esc(phone) + "<br>";
  if (email) cHtml += esc(email);
  document.getElementById("prev-client").innerHTML = cHtml || "\u2014";

  // Determine if any TVA > 0
  var prests = getPrestations();
  var hasTva = prests.some(function(p){ return p.tva > 0; });

  // Table header
  var thead = document.getElementById("prev-thead");
  if (hasTva) {
    thead.innerHTML = "<th>Description</th><th class='center'>Qt\u00e9</th><th class='center'>Prix HT</th><th class='center'>TVA</th><th class='right'>Total HT</th>";
  } else {
    thead.innerHTML = "<th>Description de la prestation</th><th class='center'>Quantit\u00e9</th><th class='center'>Prix unitaire</th><th class='right'>Total HT</th>";
  }

  // Table body
  var tbody = document.getElementById("prev-tbody");
  var totalHT = 0;
  var totalTVA = 0;
  var hasContent = prests.length > 0 && prests.some(function(p){ return p.desc || p.price; });

  if (!hasContent) {
    var span = hasTva ? 5 : 4;
    tbody.innerHTML = "<tr><td colspan='" + span + "' style='text-align:center;color:#6B7280;padding:20px;font-style:italic'>Aucune prestation saisie</td></tr>";
  } else {
    var rows = "";
    for (var i = 0; i < prests.length; i++) {
      var p = prests[i];
      var lineHT = p.price * (p.units || 1);
      var lineTVA = lineHT * p.tva / 100;
      totalHT += lineHT;
      totalTVA += lineTVA;
      rows += "<tr>";
      rows += "<td>" + esc(p.desc || "\u2014") + "</td>";
      rows += "<td class='center'>" + esc(p.qty || "\u2014") + "</td>";
      rows += "<td class='center'>" + (p.price > 0 ? fmt(p.price) : "\u2014") + "</td>";
      if (hasTva) {
        rows += "<td class='center'>" + (p.tva > 0 ? p.tva.toString().replace(".",",") + "%" : "\u2014") + "</td>";
      }
      rows += "<td class='right'>" + (lineHT > 0 ? fmt(lineHT) : "\u2014") + "</td>";
      rows += "</tr>";
    }
    tbody.innerHTML = rows;
  }

  // Totals
  var totalsEl = document.getElementById("prev-totals");
  var totalTTC = totalHT + totalTVA;
  if (hasTva) {
    totalsEl.innerHTML =
      "<div class='inv-total-row'><span>Total HT</span><span>" + fmt(totalHT) + "</span></div>" +
      "<div class='inv-total-row'><span>TVA</span><span>" + fmt(totalTVA) + "</span></div>" +
      "<div class='inv-total-final'><span>TOTAL TTC</span><span>" + fmt(totalTTC) + "</span></div>";
  } else {
    totalsEl.innerHTML =
      "<div class='inv-total-row'><span>Total HT</span><span>" + fmt(totalHT) + "</span></div>" +
      "<div class='inv-total-final'><span>TOTAL TTC</span><span>" + fmt(totalHT) + "</span></div>";
  }

  // TVA note
  document.getElementById("prev-tva-note").style.display = hasTva ? "none" : "block";

  // Footer block - depends on mode
  var footerEl = document.getElementById("prev-footer-block");
  if (currentMode === "devis") {
    footerEl.innerHTML =
      "<div class='inv-footer-block'><h4>Validation du devis</h4>" +
      "<p>Pour accepter ce devis, veuillez le retourner sign\u00e9 avec la mention manuscrite \"Bon pour accord\".</p>" +
      "<div class='signature-zone'>" +
      "<div class='sig-box'><div class='sig-label'>Le client</div>" +
      "<div class='sig-mention'>Bon pour accord</div>" +
      "<div class='sig-line'>Date :</div>" +
      "<div class='sig-line' style='margin-top:24px'>Signature :</div></div>" +
      "<div class='sig-box'><div class='sig-label'>L'\u00e9metteur</div>" +
      "<div class='sig-mention'>" + esc(EMITTER.name) + "</div>" +
      "<div class='sig-line'>Date :</div>" +
      "<div class='sig-line' style='margin-top:24px'>Signature :</div></div>" +
      "</div></div>";
  } else {
    footerEl.innerHTML =
      "<div class='inv-footer-block'><h4>Informations de r\u00e8glement</h4>" +
      "<p>\u00c9ch\u00e9ance : " + esc(echeance || "Sous 30 jours \u00e0 compter de la date d'\u00e9mission de la facture") + "<br>" +
      "Mode de paiement : Virement bancaire<br><br>" +
      "<strong>IBAN :</strong> " + esc(EMITTER.iban) + "<br>" +
      "<strong>BIC :</strong> " + esc(EMITTER.bic) + "</p></div>";
  }

  // Legal
  document.getElementById("prev-legal").innerHTML =
    (currentMode === "facture"
      ? "P\u00e9nalit\u00e9s de retard : indemnit\u00e9 forfaitaire de 40 \u20ac pour frais de recouvrement et int\u00e9r\u00eats au taux l\u00e9gal.<br>"
      : "Devis gratuit et sans engagement.<br>") +
    esc(EMITTER.name) + " &mdash; SIREN : 101 725 281 &mdash; Immatricul\u00e9 au RNE le 02/03/2026";
}

function fmt(n) {
  return n.toLocaleString("fr-FR", {minimumFractionDigits:2, maximumFractionDigits:2}) + " \u20ac";
}

// ============================================================
// PWA INSTALL
// ============================================================
window.addEventListener("beforeinstallprompt", function(e) {
  e.preventDefault();
  deferredInstallPrompt = e;
  if (!localStorage.getItem("install_dismissed")) {
    document.getElementById("install-banner").classList.add("show");
  }
});

function installApp() {
  if (!deferredInstallPrompt) return;
  deferredInstallPrompt.prompt();
  deferredInstallPrompt.userChoice.then(function(){
    deferredInstallPrompt = null;
    document.getElementById("install-banner").classList.remove("show");
  });
}

function dismissInstall() {
  localStorage.setItem("install_dismissed", "1");
  document.getElementById("install-banner").classList.remove("show");
}

// Service Worker registration
if ("serviceWorker" in navigator) {
  window.addEventListener("load", function() {
    navigator.serviceWorker.register("service-worker.js").catch(function(err){
      console.log("SW registration failed (normal if running locally):", err);
    });
  });
}

// ============================================================
// INIT
// ============================================================
window.addEventListener("DOMContentLoaded", function() {
  // Set today's date
  document.getElementById("inv-date").value = new Date().toISOString().split("T")[0];

  // Load saved data
  loadData();

  // Restore prestations or add one
  try {
    var raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      var data = JSON.parse(raw);
      if (data.form && data.form._prestations && data.form._prestations.length) {
        document.getElementById("prest-container").innerHTML = "";
        prestCount = 0;
        for (var i = 0; i < data.form._prestations.length; i++) {
          addPrest(data.form._prestations[i]);
        }
      } else {
        addPrest();
      }
    } else {
      addPrest();
    }
  } catch(e) {
    addPrest();
  }

  // If no number set, use counter
  var numEl = document.getElementById("inv-number");
  if (!numEl.value) {
    var c = loadCounters();
    numEl.value = c[currentMode];
  }

  updatePreview();
});
